on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Linux
        run: bash scripts/build.sh linux-x64

      - name: Build Windows
        run: bash scripts/build.sh win-x64

      - name: Zip artifacts
        run: |
          cd dist
          (cd linux-x64 && zip -r ../OpenGarrison-Linux-x64.zip .)
          (cd win-x64 && zip -r ../OpenGarrison-Windows-x64.zip .)

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OpenGarrison-Linux-x64.zip
            dist/OpenGarrison-Windows-x64.zip
